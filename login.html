<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>Core 34 | Login</title>
</head>
<body>
    <div class="card">
        <h2>CORE<span>34</span></h2>
        <input type="text" id="logUser" placeholder="Username">
        <input type="password" id="logPass" placeholder="Password">
        <button class="btn" onclick="handleLogin()">LOG IN</button>
        <p style="margin-top:20px; font-size:12px; color:#444">New user? <a href="register.html" style="color:var(--accent)">Register</a></p>
    </div>

    <script>
        function handleLogin() {
            const user = document.getElementById('logUser').value;
            const pass = document.getElementById('logPass').value;
            if (user === localStorage.getItem('storedUser') && pass === localStorage.getItem('storedPass')) {
                localStorage.setItem('session', 'active');
                window.location.href = 'index.html';
            } else {
                alert("Invalid Credentials");
            }
        }
    </script>
</body>
</html>
